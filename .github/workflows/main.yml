name: Johanna Activation
on:
  workflow_dispatch:

jobs:
  activate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Run Johanna
        run: |
          echo "Johanna is waking up..." > success.txt
          echo "System Status: Online" >> success.txt
          python Johanna_brain.py

      - name: Save Changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add success.txt
          git commit -m "Johanna updated the status" || exit 0
          git push
