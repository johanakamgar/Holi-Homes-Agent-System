name: Johanna Activation
on:
  workflow_dispatch:

jobs:
  activate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Create Success File
        run: |
          echo "Johanna is ONLINE at $(date)" > success.txt

      - name: Push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add success.txt
          git commit -m "Forced success file creation"
          git push
